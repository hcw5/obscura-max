name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: obscura-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: obscura-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            name: obscura-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            name: obscura-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: obscura-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build stealth
        run: cargo build --release --target ${{ matrix.target }} --features stealth
        continue-on-error: true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz obscura
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip obscura.exe
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
